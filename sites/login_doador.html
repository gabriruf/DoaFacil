<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login DOA FÁCIL</title>
    <link rel="stylesheet" href="/CSS/style.css">
    <link rel="stylesheet" href="/CSS/form.css">
</head>
<body>

    <header class="header">
        <!-- Mantendo o título conforme a imagem de referência -->
        <h1>Logar</h1> 
        <nav class="nav">
            <a href="ondedoar.html">SAIBA ONDE DOAR</a> | 
            <a href="#">SOBRE NOS</a> | 
            <a href="#">CONHECIMENTO FINANCEIRO</a>
        </nav>
    </header>

    <main class="container">
        <form class="form-cadastro">
            
            <!-- Campo de Email -->
            <div class="input-group full-width">
                <label for="email">EMAIL:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <!-- Campo de Senha -->
            <div class="input-group full-width">
                <label for="senha">SENHA:</label>
                <input type="password" id="senha" name="senha" required>
            </div>

            <!-- Botão Entrar -->
            <div class="button-container">
                <a href="/sites/doacao.html"><button type="button" class="btn">ENTRAR</button></a>
            </div>
            
        </form>
        <a href="/index.html" class="btn-voltar">Voltar</a>
    </main>

</body>
</html>
